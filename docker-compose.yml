# Docker Compose — FreelanceMCP Web Dashboard
version: "3.8"

services:
  freelance-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: freelance-dashboard
    ports:
      - "8080:8080"
    env_file:
      - .env.dev # All secrets & config loaded from .env.dev
    environment:
      - APP_ENV=dev
      # Runtime data file paths (inside the container → /app/data/)
      - BIDS_JSON_PATH=/app/data/bids.json
      - STATUS_JSON_PATH=/app/data/status.json
    volumes:
      # Persist bids.json & status.json across container restarts
      - dashboard-data:/app/data
    restart: unless-stopped
    networks:
      - freelance-network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/status')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Optional: Redis for caching (future enhancement)
  redis:
    image: redis:7-alpine
    container_name: freelance-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - freelance-network
    profiles:
      - with-cache

networks:
  freelance-network:
    driver: bridge

volumes:
  dashboard-data:
    driver: local
  redis-data:
    driver: local

# ─────────────────────────────────────────────────────────────
# Usage on AWS Lightsail (or any server):
#
#   # First deploy / after code changes:
#   git pull
#   docker compose up -d --build
#
#   # View live logs without blocking the terminal:
#   docker compose logs -f
#
#   # Stop:
#   docker compose down
#
#   # ✅ Close SSH terminal anytime — container keeps running
#   # ✅ Server reboot — container auto-restarts (restart: unless-stopped)
# ─────────────────────────────────────────────────────────────
#
# Basic startup:
#   docker-compose up -d
#
# With Redis cache:
#   docker-compose --profile with-cache up -d
#
# With PostgreSQL:
#   docker-compose --profile with-postgres up -d
#
# Full stack:
#   docker-compose --profile with-cache --profile with-postgres up -d
#
# View logs:
#   docker-compose logs -f freelance-mcp
#
# Stop services:
#   docker-compose down
#
# Rebuild and start:
#   docker-compose up -d --build
